<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unseen P2P Chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        #setup { background: #fff; padding: 20px; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #setup input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 800px; margin: 0 auto; background: white; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #messages { display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; word-wrap: break-word; position: relative; }
        .msg.received { background: #e9e9eb; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.sent { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg .sender { font-size: 0.7em; font-weight: bold; margin-bottom: 4px; display: block; opacity: 0.7; }
        #controls { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 24px; outline: none; }
        #input:focus { border-color: #007aff; }
        button { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.8em; margin-left: 10px; color: #666; }
    </style>
</head>
<body>
    <div id="setup">
        <input type="text" id="relay-addr" placeholder="Relay Multiaddr (e.g., /ip4/127.0.0.1/tcp/8001/ws/p2p/...)">
        <button id="connect-btn">Connect</button>
        <span id="status">Disconnected</span>
    </div>
    <div id="app">
        <div id="chat-window"><div id="messages"></div></div>
        <div id="controls">
            <input type="text" id="input" placeholder="Type a message..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
